name: Daily market data and strategy audit

on:
  schedule:
    # 09:30 China Standard Time on trading days, after the US session has closed.
    - cron: "30 1 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout public site
        uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install data dependencies
        run: npm ci --omit=dev
      - name: Refresh HK, US, and institution data
        run: node scripts/write-live-snapshot.mjs
      - name: Audit strategy candidates
        run: node scripts/audit-strategy-candidates.mjs
      - name: Commit refreshed market data
        run: |
          git config user.name "aurumer-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live-snapshot.json data/us-signal-snapshots.json data/strategy-audit.json sitemap.xml
          if git diff --cached --quiet; then
            echo "No market data changes"
          else
            git commit -m "refresh market data $(date -u +%F)"
            git push
          fi
