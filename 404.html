<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>正在打开｜望潮 Aurum</title>
</head>
<body>
  <p>正在打开望潮 Aurum...</p>
  <script>
    (() => {
      const base = location.hostname.endsWith('.github.io') ? '/aurumer/' : '/';
      const path = location.pathname.replace(/^\/aurumer(?=\/|$)/, '');
      const parts = path.split('/').filter(Boolean).map(decodeURIComponent);
      let route = '';
      if (parts[0] === 'hk-ipo') route = parts[1] ? `ipo/${parts[1]}` : 'hk';
      else if (parts[0] === 'us-stocks') route = 'us';
      else if (parts[0] === 'stocks' && parts[1]) route = `stock/${parts[1].toUpperCase()}`;
      else if (parts[0] === 'a-shares') route = parts[1] ? `a-share/${parts[1]}` : 'a-shares';
      else if (parts[0] === 'gurus') route = parts[1] ? `investor/${parts[1].toLowerCase()}` : 'gurus';
      location.replace(`${base}${route ? `#/${route}` : ''}`);
    })();
  </script>
</body>
</html>
