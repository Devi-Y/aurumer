<html lang="zh-CN">

<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">

<style>
:root{
  --bg:#F4F1E9; --card:#FFFDF9;
  --ink:#1F2B2A; --ink2:#69716B; --ink3:#9AA098;
  --line:#E4DED1; --line2:#F0EBDD;
  --accent:#B64C35; --accent-soft:#F8E6DF;
  --navy:#1F2B2A; --forest:#176B52; --gold:#B4872E;
  --up:#C93A2B; --up-soft:#FBEAE7;
  --down:#177E52; --down-soft:#E4F3EB;
  --amber:#A97815; --amber-soft:#F6EDD8;
  --gray-soft:#EFECE4;
  --radius:18px;
  --shadow:0 1px 2px rgba(38,36,31,.04), 0 10px 30px -18px rgba(38,36,31,.18);
}
html{color-scheme:light}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;max-width:100%;overflow-x:clip}
body{
  background:
    radial-gradient(circle at 10% -10%,rgba(180,135,46,.11),transparent 31rem),
    radial-gradient(circle at 96% 7%,rgba(23,107,82,.10),transparent 28rem),
    var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  font-size:15px; line-height:1.55;
  padding-bottom:env(safe-area-inset-bottom);
  max-width:100%;overflow-x:clip;
}
#app{max-width:840px;margin:0 auto;padding:0 16px 56px}
.serif{font-family:"Songti SC","STSong",Georgia,"Times New Roman",serif}
.num{font-variant-numeric:tabular-nums}
a{color:var(--accent);text-decoration:none}
button,a,.door{touch-action:manipulation}
img,svg,canvas{max-width:100%}
.card,.door,.share-card,.notice,.advice{overflow-wrap:anywhere}

/* ---------- header ---------- */
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:28px 2px 12px;border-bottom:1px solid rgba(228,222,209,.82)}
.brand{font-size:29px;font-weight:700;letter-spacing:.5px}
.brand small{font-size:13px;color:var(--ink2);font-weight:500;margin-left:9px;letter-spacing:.7px}
.top .date{font-size:12px;color:var(--ink3);text-align:right;line-height:1.5}
.top-left{display:flex;flex-direction:column;gap:8px;min-width:0}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.desktop-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.desktop-nav a,.header-beta-btn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--ink2);font-size:12px;font-weight:750;box-shadow:var(--shadow);transition:transform .15s,border-color .15s,background .15s,color .15s}
.desktop-nav a:hover,.header-beta-btn:hover,.hero-actions a:hover,.hero-actions button:hover,.growth-actions a:hover,.growth-actions button:hover,.share-actions button:hover{transform:translateY(-1px);border-color:#D5C9B4;color:var(--ink)}
.header-beta-btn{color:var(--accent);border-color:rgba(182,76,53,.24);background:linear-gradient(180deg,rgba(248,230,223,.96),rgba(255,255,255,.9))}
.desktop-nav a:active,.header-beta-btn:active,.hero-actions a:active,.hero-actions button:active,.growth-actions a:active,.growth-actions button:active,.share-actions button:active{transform:scale(.985)}
.data-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;border-radius:999px;padding:2px 8px;font-weight:600}
.data-badge.loading{color:var(--amber);background:var(--amber-soft)}
.data-badge.live{color:var(--down);background:var(--down-soft)}
.data-badge.partial,.data-badge.stale{color:var(--amber);background:var(--amber-soft)}
.data-badge.fallback{color:var(--ink2);background:var(--gray-soft)}
.data-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.source-line{font-size:11px;color:var(--ink3);margin-top:5px}
.source-line a{color:var(--ink2);text-decoration:underline;text-underline-offset:2px}
.level-path{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:2px 2px 12px;font-size:11.5px;color:var(--ink3)}
.level-path b{color:var(--accent);font-weight:800}
.level-path span::after{content:"›";margin-left:6px;color:var(--line)}
.level-path span:last-child::after{display:none}
.official-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.official-link{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:12px;font-weight:600;color:var(--accent);background:var(--card)}
.guide-card{background:linear-gradient(135deg,#FFFDF8,#F5EFE4);border:1px solid #E9DECB;border-radius:16px;padding:14px 16px;margin-bottom:14px}
.guide-card b{display:block;font-size:14px;margin-bottom:4px}
.guide-card p{font-size:12.5px;color:var(--ink2);line-height:1.7}
.home-nav{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.home-nav a{display:inline-flex;align-items:center;min-height:38px;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--ink2);font-size:12px;font-weight:750;box-shadow:var(--shadow)}
.home-nav a:hover{border-color:#D5C9B4;color:var(--ink)}
.home-section{margin-top:22px}
.home-core-grid{display:grid;grid-template-columns:1fr;gap:14px}
.home-portal{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;min-height:176px;padding:18px 18px 15px;border-radius:24px;color:#FBF6EE;box-shadow:var(--shadow);transition:transform .16s,border-color .16s;cursor:pointer}
.home-portal:hover{transform:translateY(-2px)}
.home-portal:active{transform:scale(.985)}
.home-portal::after{content:"";position:absolute;right:-72px;top:-72px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}
.home-portal .kicker{position:relative;z-index:1;font-size:11px;letter-spacing:2px;font-weight:800;opacity:.82}
.home-portal h4{position:relative;z-index:1;margin-top:9px;font-size:22px;line-height:1.15;font-weight:800;letter-spacing:-.4px}
.home-portal p{position:relative;z-index:1;margin-top:10px;font-size:13px;line-height:1.68;color:rgba(255,255,255,.86)}
.home-portal .note{position:relative;z-index:1;margin-top:11px;font-size:12px;font-weight:700;color:rgba(255,255,255,.92)}
.home-portal .foot{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;padding-top:12px;border-top:1px dashed rgba(255,255,255,.18);font-size:12px;font-weight:800}
.home-portal .foot span:first-child{display:inline-flex;align-items:center;min-height:30px;padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.15)}
.home-portal .foot span:last-child{font-size:16px;line-height:1}
.home-portal.hk{background:linear-gradient(135deg,#9E4426,#C86A45)}
.home-portal.us{background:linear-gradient(135deg,#1E3A31,#356450)}
.home-portal.a{background:linear-gradient(135deg,#243C43,#436B72)}
.home-portal.risk{background:linear-gradient(135deg,#303742,#59626E)}
.home-portal.guru{background:linear-gradient(135deg,#223A42,#496A5F)}
.hero-actions,.growth-actions,.share-actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.hero-actions{position:relative;z-index:1;margin-top:16px}
.hero-actions a,.hero-actions button,.growth-actions a,.growth-actions button,.share-actions button{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:13px;font-weight:750;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,border-color .15s,background .15s,color .15s}
.hero-actions .primary,.growth-actions .primary,.share-actions .primary{background:linear-gradient(135deg,var(--accent),#D37749);border-color:transparent;color:#fff}
.hero-actions .secondary,.growth-actions .secondary,.share-actions .secondary{background:var(--card);color:var(--accent)}
.home-growth{display:grid;gap:14px}
.home-growth .growth-box{position:relative;overflow:hidden;padding:18px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(135deg,rgba(23,107,82,.06),rgba(182,76,53,.08)),var(--card);box-shadow:var(--shadow)}
.home-growth .growth-box::after{content:"";position:absolute;right:-70px;top:-90px;width:200px;height:200px;border-radius:50%;background:rgba(182,76,53,.08);pointer-events:none}
.home-growth h3{font-size:19px;line-height:1.35}
.home-growth p{margin-top:8px;font-size:13px;line-height:1.7;color:var(--ink2)}
.growth-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.growth-tags span{display:inline-flex;align-items:center;min-height:30px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:var(--card);font-size:12px;font-weight:700;color:var(--ink)}
.growth-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}
.growth-meta .meta-item{padding:12px 13px;border-radius:16px;background:rgba(255,255,255,.58);border:1px solid var(--line2)}
.growth-meta .meta-item b{display:block;font-size:13px;margin-bottom:4px}
.growth-meta .meta-item span{display:block;font-size:12.5px;line-height:1.65;color:var(--ink2)}
.version-compare{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.version-card{padding:16px;border:1px solid var(--line);border-radius:20px;background:var(--card);box-shadow:var(--shadow)}
.version-card h4{font-size:17px;margin-bottom:8px}
.version-card .sub{font-size:12px;color:var(--ink2);line-height:1.65;margin-bottom:12px}
.version-card ul{padding-left:18px;display:grid;gap:6px;color:var(--ink);line-height:1.65;font-size:13px}
.version-card .flag{display:inline-flex;align-items:center;min-height:28px;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:11.5px;font-weight:800;margin-bottom:10px}
.share-actions{margin-top:14px}
.home-panel-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.home-panel-grid.one{grid-template-columns:1fr}
.home-panel{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;min-height:132px;padding:15px 15px 14px;border:1px solid var(--line);border-radius:18px;background:var(--card);color:var(--ink);box-shadow:var(--shadow);transition:transform .16s,border-color .16s}
.home-panel:hover{transform:translateY(-2px);border-color:#D5C9B4;box-shadow:0 18px 34px -26px rgba(31,43,42,.45)}
.home-panel:active{transform:scale(.985)}
.home-panel strong{display:block;font-size:15px;line-height:1.35}
.home-panel > span{display:block;margin-top:8px;font-size:12.5px;line-height:1.65;color:var(--ink2)}
.home-panel .pill{min-height:auto;padding:4px 8px;font-size:11px;margin-top:12px}
.home-panel-grid .home-panel .meta{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.home-panel-grid .home-panel .state{padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800;background:var(--gray-soft);color:var(--ink2);white-space:nowrap}
.home-panel-grid .home-panel .state.hot{background:var(--up-soft);color:var(--up)}
.home-panel-grid .home-panel .state.mid{background:var(--amber-soft);color:var(--amber)}
.home-panel-grid .home-panel .state.safe{background:var(--down-soft);color:var(--down)}
.home-steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.home-step{position:relative;min-height:160px;padding:15px 15px 14px;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow)}
.home-step .idx{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:800}
.home-step b{display:block;margin-top:12px;font-size:15px;line-height:1.4}
.home-step p{margin-top:8px;font-size:12.5px;line-height:1.7;color:var(--ink2)}
.home-footnote{margin-top:8px;font-size:12px;color:var(--ink3)}
.home-section .empty-answer{margin-top:4px}
.answer-block{background:var(--bg);border-radius:13px;padding:11px 13px;margin-top:12px}
.answer-line{display:flex;gap:8px;font-size:12.5px;line-height:1.55;margin:3px 0}
.answer-line strong{width:58px;flex-shrink:0;color:var(--ink2)}
.answer-line b{color:var(--ink)}
.term-q{width:17px;height:17px;border:1px solid var(--line);border-radius:50%;background:var(--card);color:var(--ink2);font-size:11px;line-height:15px;cursor:pointer;vertical-align:1px;margin-left:3px}
.term-pop{position:fixed;inset:0;z-index:100;background:rgba(38,36,31,.35);display:flex;align-items:flex-end;justify-content:center;padding:16px}
.term-sheet{width:min(440px,100%);background:var(--card);border-radius:20px;padding:20px;box-shadow:0 20px 60px rgba(38,36,31,.25)}
.term-sheet b{display:block;font-size:17px;margin-bottom:8px}
.term-sheet p{font-size:14px;color:var(--ink2);line-height:1.7}
.term-sheet button{width:100%;border:0;border-radius:12px;background:var(--ink);color:#fff;padding:11px;margin-top:16px;font-weight:700;cursor:pointer}
.mobile-nav{display:none}
.share-card{position:relative;overflow:hidden;background:linear-gradient(145deg,#FFFDF8,#F4EBDD);border:1px solid #E8D9BF;border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.share-card::after{content:"";position:absolute;width:150px;height:150px;border-radius:50%;right:-70px;top:-80px;background:rgba(194,94,61,.08)}
.share-brand{font-size:12px;letter-spacing:1.5px;color:var(--accent);font-weight:800;margin-bottom:12px}
.share-card h2{font-size:21px;margin-bottom:13px}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.share-item{background:rgba(255,255,255,.72);border-radius:12px;padding:9px 11px}
.share-item span{display:block;font-size:11px;color:var(--ink2)}
.share-item b{display:block;font-size:14px;margin-top:2px}
.share-risk{font-size:12.5px;color:var(--ink2);margin-top:11px;line-height:1.6}
.share-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid #E8D9BF;margin-top:13px;padding-top:11px;font-size:11px;color:var(--ink3)}
.copy-btn{position:relative;z-index:1;border:1px solid #D8C7AA;background:#fff;border-radius:999px;padding:6px 11px;color:var(--accent);font-weight:700;cursor:pointer}

/* ---------- answer-first hierarchy ---------- */
.decision-hero{position:relative;overflow:hidden;margin:18px 0 18px;padding:25px 25px 22px;border-radius:25px;color:#FFFDF7;background:linear-gradient(135deg,#22352F,#174B3D);box-shadow:0 18px 42px -28px rgba(23,57,48,.72)}
.decision-hero.hk-hero{background:linear-gradient(135deg,#793622,#B85A3C)}
.decision-hero::after{content:"";position:absolute;width:260px;height:260px;border-radius:50%;right:-114px;top:-154px;border:1px solid rgba(255,255,255,.15);box-shadow:0 0 0 30px rgba(255,255,255,.035),0 0 0 70px rgba(255,255,255,.025)}
.decision-kicker{position:relative;z-index:1;font-size:11px;letter-spacing:2.5px;font-weight:800;color:rgba(255,255,255,.68)}
.decision-hero h2{position:relative;z-index:1;font-size:29px;line-height:1.2;letter-spacing:-.7px;margin:6px 0 8px;font-weight:800}
.decision-hero p{position:relative;z-index:1;max-width:620px;font-size:13.5px;line-height:1.68;color:rgba(255,255,255,.79)}
.decision-metrics{position:relative;z-index:1;display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.decision-metric{min-width:92px;padding:8px 10px;border-radius:11px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.12)}
.decision-metric b{display:block;font-size:16px;line-height:1.1;color:#fff}
.decision-metric span{display:block;margin-top:3px;font-size:10.5px;color:rgba(255,255,255,.69)}
.section-intro{margin:18px 2px 10px;display:flex;align-items:flex-end;justify-content:space-between;gap:14px}
.section-intro h3{font-size:18px;letter-spacing:-.3px}
.section-intro p{max-width:430px;font-size:12px;color:var(--ink2);text-align:right;line-height:1.55}
.answer-section{margin-top:22px;padding-top:4px;border-top:1px solid var(--line)}
.empty-answer{padding:18px;border:1px dashed var(--line);border-radius:16px;color:var(--ink3);font-size:13px;background:rgba(255,253,249,.45)}
.result-chip{display:inline-flex;align-items:center;min-height:28px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800;white-space:nowrap}
.result-chip.pending{background:#F4E8C9;color:#866116}.result-chip.ended{background:var(--gray-soft);color:var(--ink2)}
.result-chip.buy{background:var(--down);color:#fff}.result-chip.caution{background:var(--amber-soft);color:var(--amber)}.result-chip.skip{background:var(--up-soft);color:var(--up)}
.compact-card{position:relative;padding:17px 18px 14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,253,249,.92);box-shadow:0 12px 28px -26px rgba(31,43,42,.62);margin-bottom:11px;cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s}
.compact-card:hover{transform:translateY(-2px);border-color:#D3C8B2;box-shadow:0 20px 35px -26px rgba(31,43,42,.5)}
.compact-card:active{transform:scale(.987)}
.compact-card.muted{background:rgba(246,243,236,.78);box-shadow:none}
.compact-top{display:flex;align-items:flex-start;gap:12px}
.compact-title{min-width:0;flex:1}.compact-title h3{font-size:16px;line-height:1.35;display:flex;gap:7px;align-items:center;flex-wrap:wrap}.compact-title span{font-size:11.5px;font-weight:550;color:var(--ink3)}
.compact-answer{margin:13px 0 10px;font-size:14px;font-weight:700;line-height:1.55}.compact-answer b{color:var(--accent)}
.compact-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11.5px;color:var(--ink2)}
.metric-chip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;background:var(--bg);border:1px solid var(--line2);font-size:11px;font-weight:650;color:var(--ink2)}
.compact-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--line2);font-size:12px;font-weight:700;color:var(--accent)}
.compact-rank{width:25px;flex-shrink:0;padding-top:1px;font-family:Georgia,serif;font-size:17px;font-weight:800;color:var(--accent)}
.quality-pill{padding:4px 8px;border-radius:999px;background:var(--down-soft);color:var(--down);font-size:11px;font-weight:800;white-space:nowrap}

/* ---------- simplified market pages ---------- */
.home-context{margin:19px 2px 14px;font-size:14px;color:var(--ink2)}
.home-context b{display:block;color:var(--ink);font-size:18px;margin-bottom:2px}
.doors{display:grid;grid-template-columns:1fr;gap:16px}
.market-summary{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:18px 0 14px;padding:15px 16px;border:1px solid var(--line);border-radius:16px;background:rgba(255,253,249,.7)}
.market-summary b{display:block;font-size:16px;line-height:1.35}.market-summary span{display:block;margin-top:3px;font-size:12.5px;color:var(--ink2)}
.market-tabs{display:flex;gap:7px;overflow-x:auto;padding:1px 0 10px;scrollbar-width:none}.market-tabs::-webkit-scrollbar{display:none}
.market-tab{border:1px solid var(--line);border-radius:999px;background:var(--card);padding:7px 12px;color:var(--ink2);font-size:12.5px;font-weight:750;white-space:nowrap;cursor:pointer}.market-tab.on{border-color:var(--ink);background:var(--ink);color:#fff}
.market-tab em{font-style:normal;opacity:.72;margin-left:3px;font-size:11px}
.active-panel{margin-top:2px}.active-panel .section-intro{margin:5px 2px 10px}.active-panel .section-intro p{display:none}
.compact-card{padding:14px 16px 12px;margin-bottom:9px;border-radius:16px}
.compact-title h3{font-size:15.5px}.compact-answer{margin:9px 0 8px;font-size:13.5px}.compact-foot{margin-top:9px;padding-top:8px}
.quote-now{text-align:right;flex-shrink:0}.quote-now b{display:block;font-size:16px;line-height:1.1}.quote-now span{display:block;margin-top:3px;font-size:11px;font-weight:750}
.price-map{display:grid;grid-template-columns:1.05fr 1fr 1fr;gap:8px;margin:13px 0 2px}.price-map .price-cell{padding:11px 12px;border:1px solid var(--line2);border-radius:13px;background:rgba(255,255,255,.72)}
.price-map .price-cell.primary{background:var(--ink);border-color:var(--ink);color:#fff}.price-cell span{display:block;font-size:11px;color:var(--ink2)}.price-cell.primary span{color:rgba(255,255,255,.7)}.price-cell b{display:block;margin-top:3px;font-size:16px;line-height:1.2}.price-cell small{display:block;margin-top:3px;font-size:10.5px;color:var(--ink3)}.price-cell.primary small{color:rgba(255,255,255,.68)}
.price-note{margin-top:12px;font-size:12px;color:var(--ink2);line-height:1.65}
.facts-card{padding:4px 17px}.facts-card .kv td{padding:12px 0}.facts-empty{padding:18px 0;color:var(--ink2);font-size:13px}

/* ---------- level-1 doors ---------- */
.door{position:relative;border-radius:26px;padding:24px;margin-bottom:16px;cursor:pointer;color:#FBF6EE;overflow:hidden;box-shadow:var(--shadow);transition:transform .18s;animation:rise .45s cubic-bezier(.2,.8,.25,1) both}
.door.us-d{animation-delay:.08s}
.door:active{transform:scale(.98)}
.door:hover{transform:translateY(-2px)}
.door.hk-d{background:linear-gradient(135deg,#9E4426,#C86A45)}
.door.us-d{background:linear-gradient(135deg,#1E3A31,#356450)}
.door::after{content:'';position:absolute;right:-70px;top:-70px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.door .d-label{font-size:12.5px;letter-spacing:3px;opacity:.8;font-weight:600}
.door h2{font-size:30px;margin:4px 0 2px;display:flex;justify-content:space-between;align-items:center;font-weight:800}
.door .go{font-size:13.5px;background:rgba(255,255,255,.16);border-radius:999px;padding:7px 16px;font-weight:600;flex-shrink:0}
.door .dsub{font-size:13px;opacity:.75}
.door .d-line{border-top:1px dashed rgba(255,255,255,.28);margin:16px 0 12px}
.door .drow{display:flex;gap:8px;align-items:baseline;font-size:14px;margin:7px 0}
.door .drow .dk{font-size:12px;opacity:.7;width:64px;flex-shrink:0}
.door .drow b{font-weight:700}
.door .dchip{background:rgba(255,255,255,.16);border-radius:8px;padding:1px 8px;font-size:12px;font-weight:700;white-space:nowrap}

/* ---------- sub pills ---------- */
.pills{display:flex;gap:8px;margin:2px 0 10px;flex-wrap:wrap}
.pill{min-height:40px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 15px;font-size:13.5px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .15s}
.pill.on{background:var(--ink);border-color:var(--ink);color:#fff}
.pill:active{transform:scale(.96)}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;animation:rise .4s cubic-bezier(.2,.8,.25,1) both}
.card.click{cursor:pointer;transition:transform .15s, box-shadow .2s}
.card.click:hover{box-shadow:0 2px 4px rgba(38,36,31,.05),0 16px 40px -20px rgba(38,36,31,.28)}
.card.click:active{transform:scale(.98)}
@keyframes rise{from{transform:translateY(12px)}to{transform:none}}
.card:nth-child(2){animation-delay:.04s}.card:nth-child(3){animation-delay:.08s}
.card:nth-child(4){animation-delay:.12s}.card:nth-child(5){animation-delay:.16s}
.card:nth-child(6){animation-delay:.2s}.card:nth-child(7){animation-delay:.24s}

.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:24px 2px 12px}
.section-h h3{font-size:16.5px;font-weight:800}
.section-h span{font-size:12px;color:var(--ink3)}
.research-entry{display:flex;align-items:center;justify-content:space-between;gap:14px;background:linear-gradient(135deg,#FFFDF8,#F3EBDD)}
.research-entry .t2{max-width:580px;line-height:1.65}
.rule-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.rule-card{background:var(--bg);border:1px solid var(--line2);border-radius:14px;padding:13px}
.rule-card .rule-name{font-size:13px;font-weight:800}
.rule-card .rule-result{font-size:20px;font-family:Georgia,serif;font-weight:800;margin:6px 0 2px}
.rule-card .rule-meta{font-size:11.5px;color:var(--ink2);line-height:1.6}
.signal-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.signal{border-radius:999px;padding:4px 9px;font-size:11.5px;font-weight:650}
.signal.good{background:var(--down-soft);color:var(--down)}
.signal.risk{background:var(--up-soft);color:var(--up)}
.signal.neutral{background:var(--gray-soft);color:var(--ink2)}

/* ---------- chips ---------- */
.chip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 11px;font-size:12px;font-weight:700;white-space:nowrap}
.chip.buy{background:var(--down);color:#fff}
.chip.caution{background:var(--amber-soft);color:var(--amber)}
.chip.skip{background:var(--gray-soft);color:var(--ink2)}
.chip.cheap{background:var(--down-soft);color:var(--down)}
.chip.fair{background:var(--amber-soft);color:var(--amber)}
.chip.rich{background:var(--up-soft);color:var(--up)}
.chip.mini{padding:2px 8px;font-size:11px}
.chip.tag{background:var(--gray-soft);color:var(--ink2);font-weight:600}
.chip.acc{background:var(--accent-soft);color:var(--accent)}

.upc{color:var(--up)} .dnc{color:var(--down)}

/* ---------- stat mini grid ---------- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.stats.g3{grid-template-columns:repeat(3,1fr)}
.stat{background:var(--bg);border-radius:12px;padding:9px 10px}
.stat b{display:block;font-size:14.5px;font-weight:700;letter-spacing:-.2px}
.stat span{font-size:11px;color:var(--ink2)}

/* ---------- rows ---------- */
.row{display:flex;align-items:center;gap:14px}
.row .grow{flex:1;min-width:0}
.t1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.t1 .code{font-size:12px;color:var(--ink3);font-weight:500}
.t2{font-size:12.5px;color:var(--ink2);margin-top:3px}
.arrow{color:var(--ink3);font-size:18px;flex-shrink:0}

/* ---------- market temp ---------- */
.temp{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 16px;margin-bottom:14px;animation:rise .4s both}
.temp .tg{flex:1}
.temp .tg-name{font-size:12px;color:var(--ink2);margin-bottom:7px}
.temp .tg-name b{color:var(--ink);font-size:13px}
.tg-track{position:relative;height:8px;border-radius:4px;background:linear-gradient(90deg,#8FBCAA,#E8D9A0,#D98A6B)}
.tg-dot{position:absolute;top:-3.5px;width:15px;height:15px;border-radius:50%;background:#fff;border:3.5px solid var(--ink);transform:translateX(-50%)}
.tg-scale{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink3);margin-top:5px}
.temp .tv{text-align:center;flex-shrink:0;min-width:64px}
.temp .tv b{font-size:24px;font-weight:800;font-family:Georgia,serif;display:block;line-height:1.1}
.temp .tv span{font-size:11.5px;font-weight:700}
.temp .thint{font-size:11.5px;color:var(--ink2);margin-top:6px}

/* ---------- warn strip ---------- */
.warn{display:flex;gap:8px;align-items:flex-start;background:var(--up-soft);border:1px solid #F0D2CB;color:#8C2F1F;border-radius:14px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;line-height:1.6;animation:rise .4s both}

/* ---------- detail page ---------- */
.back{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--ink2);font-size:14px;font-weight:600;padding:16px 2px 10px;cursor:pointer}
.back:hover{color:var(--ink)}
.d-head{padding:4px 2px 14px}
.d-head h1{font-size:24px;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.d-head .sub{font-size:13px;color:var(--ink2);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.d-sec{margin-top:6px}
.d-sec h4{font-size:15px;font-weight:700;margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
.d-sec h4::before{content:"";width:4px;height:15px;border-radius:2px;background:var(--accent);display:inline-block}

.concl{background:linear-gradient(135deg,#FDF9F3,#F7EFE4);border:1px solid #EFE5D3;border-radius:var(--radius);padding:18px;display:flex;gap:18px;align-items:center}
.concl .txt{flex:1}
.concl .txt p{font-size:13.5px;color:var(--ink2);margin-top:6px}

.kv{width:100%;border-collapse:collapse;font-size:13.5px}
.kv td{padding:9px 0;border-bottom:1px solid var(--line2);vertical-align:top}
.kv td:first-child{color:var(--ink2);width:88px}
.kv tr:last-child td{border-bottom:0}

.bars .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px}
.bars .bl{width:70px;color:var(--ink2);flex-shrink:0}
.bars .track{flex:1;height:8px;background:var(--gray-soft);border-radius:4px;overflow:hidden}
.bars .fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.bars .bv{width:30px;text-align:right;font-weight:700}

.list{list-style:none}
.list li{position:relative;padding:5px 0 5px 22px;font-size:13.5px;color:#413E37}
.list li::before{position:absolute;left:0;top:5px;font-weight:700}
.list.pro li::before{content:"＋";color:var(--down)}
.list.con li::before{content:"－";color:var(--up)}

.advice{background:var(--accent-soft);border-radius:14px;padding:14px 16px;font-size:13.5px;color:#7C3C24;line-height:1.7}
.advice b{color:var(--accent)}

.tl{list-style:none;margin-left:4px}
.tl li{position:relative;padding:0 0 18px 22px;border-left:2px solid var(--line);margin-left:5px}
.tl li:last-child{border-left-color:transparent;padding-bottom:2px}
.tl .dot{position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 1px var(--line)}
.tl .dot.b{background:var(--up)} .tl .dot.s{background:var(--down)}
.tl .tt{font-size:12px;color:var(--ink3)}
.tl .ta{font-size:14px;font-weight:700;margin:1px 0}
.tl .tr{font-size:13px;color:var(--ink2)}

/* band chart */
.band-wrap{padding:26px 4px 30px}
.band{position:relative;height:14px;border-radius:7px;background:var(--gray-soft)}
.zone{position:absolute;top:0;height:100%}
.marker{position:absolute;top:-22px;transform:translateX(-50%);text-align:center}
.marker .m-dot{width:2px;height:46px;background:var(--ink);margin:0 auto;border-radius:1px}
.marker .m-lab{font-size:11px;font-weight:700;white-space:nowrap;background:var(--ink);color:#fff;border-radius:6px;padding:1px 6px;margin-bottom:2px}
.tick{position:absolute;top:20px;transform:translateX(-50%);font-size:10.5px;color:var(--ink2);text-align:center;white-space:nowrap}
.tick b{display:block;font-size:11.5px;color:var(--ink)}

/* range bar (ipo prediction) */
.rb{margin:10px 0 4px}
.rb .rb-h{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-bottom:5px}
.rb .rb-h b{color:var(--ink);font-size:13px}
.rb .rb-track{position:relative;height:10px;background:var(--gray-soft);border-radius:5px}
.rb .rb-fill{position:absolute;height:100%;border-radius:5px;opacity:.85}
.rb .rb-zero{position:absolute;top:-3px;width:2px;height:16px;background:var(--ink3);border-radius:1px}
.rb .rb-mid{position:absolute;top:-2px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--ink);transform:translateX(-50%)}

.avatar{width:52px;height:52px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;flex-shrink:0;font-family:Georgia,serif}
.hold-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

.notice{display:flex;align-items:center;gap:8px;background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:10px 14px;font-size:12.5px;color:var(--ink2);margin-bottom:14px}
.loading-shell{display:block}
.loading-copy{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.loading-bars{display:grid;grid-template-columns:1.4fr 1fr .7fr;gap:8px}
.skeleton{height:7px;border-radius:999px;background:linear-gradient(90deg,var(--line2) 20%,#fff 50%,var(--line2) 80%);background-size:220% 100%;animation:shimmer 1.25s ease-in-out infinite}
@keyframes shimmer{to{background-position:-220% 0}}

.rank{width:30px;font-size:17px;font-weight:800;color:var(--ink3);font-family:Georgia,serif;flex-shrink:0}
.rank.r1{color:var(--accent)} .rank.r2{color:#CE8457} .rank.r3{color:#D3A276}

.price-b{text-align:right;flex-shrink:0}
.price-b b{font-size:16.5px;display:block}
.price-b span{font-size:12.5px;font-weight:700}

table.hist{width:100%;border-collapse:collapse;font-size:13px}
table.hist th{font-size:11.5px;color:var(--ink3);font-weight:600;text-align:left;padding:6px 4px;border-bottom:1px solid var(--line)}
table.hist td{padding:9px 4px;border-bottom:1px solid var(--line2)}
table.hist tr:last-child td{border-bottom:0}
table.hist .r{text-align:right}

footer{margin-top:36px;text-align:center;font-size:11.5px;color:var(--ink3);line-height:1.8}

}
@media(max-width:420px){
  #app{padding-left:12px;padding-right:12px}

  .brand{font-size:24px}
  .brand small{font-size:12px;margin-left:7px}

  .hero-actions,.growth-actions,.share-actions{gap:8px}
  .hero-actions a,.hero-actions button,.growth-actions a,.growth-actions button,.share-actions button{min-height:40px;padding:9px 13px;font-size:12.5px}
  .home-nav{gap:6px}
  .home-nav a{font-size:11px;padding:6px 10px;min-height:34px}
  .home-core-grid,.home-panel-grid,.home-steps-grid,.version-compare,.growth-meta{grid-template-columns:1fr}
  .home-portal{padding:16px 16px 14px;border-radius:20px}
  .home-portal h4{font-size:20px}
  .home-portal .foot span:first-child{padding:4px 9px}
  .home-panel,.home-step{border-radius:16px}
  .card{padding:16px}
  .row{gap:10px}
  .stats,.stats.g3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .stat{min-width:0}
  .stat b{overflow-wrap:anywhere}
  .temp{gap:10px;padding:12px}
  .share-card{padding:17px}
  .share-grid{gap:6px}
  .share-item{padding:8px 9px}
  .concl{align-items:flex-start;gap:12px;padding:16px}
  .price-b{max-width:112px}
  .compact-card{padding:15px}.compact-answer{font-size:13.5px}
  .price-map{grid-template-columns:1fr;gap:7px}.price-map .price-cell{padding:10px 12px}
  .rule-grid{grid-template-columns:1fr}
  .mobile-nav{left:8px;right:8px;bottom:calc(8px + env(safe-area-inset-bottom))}
}
@media(max-width:359px){
  .top{display:block}
  .top .date{text-align:left;margin-top:6px}
  .share-grid{grid-template-columns:1fr}
  .home-portal h4{font-size:19px}
}
@media(hover:none){
  .door:hover{transform:none}
  .card.click:hover{box-shadow:var(--shadow)}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

    publicOversubscription:92.4, modelEstimate:{oneLotWinRate:{low:6,high:14,mid:9},greyMarketChange:{low:3,high:12,mid:7},firstDayChange:{low:4,high:16,mid:10},publishable:true},

async function copyTextContent(text, button, successLabel='已复制'){
  const target=button&&button.nodeType===1?button:null;
  const restoreLabel=target?.textContent?.trim()||'复制';
  const copyViaFallback=()=>{
    const input=document.createElement('textarea');
    input.value=text;
    input.setAttribute('readonly','');
    input.style.position='fixed';
    input.style.left='-9999px';
    input.style.opacity='0';
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    input.remove();
  };
  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(text);
    }else{
      copyViaFallback();
    }
  }catch{
    copyViaFallback();
  }
  if(target){
    target.textContent=successLabel;
    setTimeout(()=>{target.textContent=restoreLabel;},1500);
  }
}

function assessLiveIPO(item,temperature){
  if(item.historical||item.listingStatus==='ended'||item.allotmentUrl){
    return {
      score:0,
      vc:'ended',
      verdict:'申购已结束',
      reason:item.historical||item.listingStatus==='ended'
        ?'该项目已进入历史回顾范围，只保留实际表现和公开资料。'
        :'港交所已发布配发结果，申购窗口已经结束。',
      strategy:'不能再申购；只保留官方资料与实际结果用于回顾。'
    };
  }
  if(item.strategyAssessment){
    const assessment=item.strategyAssessment;
    const vc=assessment.verdict==='待核验'?'pending':assessment.verdict==='值得打'?'buy':assessment.verdict==='谨慎打'?'caution':'skip';
    return {
      score:vc==='buy'?80:vc==='caution'?60:vc==='pending'?0:30,
      vc,
      verdict:assessment.verdict,
      reason:assessment.action,
      strategy:assessment.action
    };
  }
  const sponsorNames=item.sponsorNames||[];
  const cornerstoneNames=item.cornerstoneInvestors||[];
  const coreFacts=[item.offerPrice,item.boardLot,item.offerDeadline,item.listingDate].filter(Boolean).length;
  const cornerstonePoints=Math.min(cornerstoneNames.length*2,10);
  const cornerstonePercentPoints=Number.isFinite(item.cornerstonePercent)?Math.min(item.cornerstonePercent*.3,12):0;
  const marketPoints=Math.max(0,Math.min((temperature?.value||50)-45,8));
  const score=Math.round(Math.min(82,38+coreFacts*4+cornerstonePoints+cornerstonePercentPoints+marketPoints));
  const vc=score>=78?'buy':score>=64?'caution':'skip';
  const verdict=vc==='buy'?'值得打':vc==='caution'?'谨慎打':'不建议';
  const knownFacts=[
    sponsorNames.length?`已识别 ${sponsorNames.length} 家保荐人`:null,
    cornerstoneNames.length?`${cornerstoneNames.length} 个基石名称已识别`:null,
    Number.isFinite(item.cornerstonePercent)?`基石约占发售股份 ${item.cornerstonePercent}%`:null
  ].filter(Boolean);
  return {
    score,
    vc,
    verdict,
    reason:`${knownFacts.join('，')||'核心招股资料已发布'}。当前判断只使用港交所公开事实，尚未计入认购倍数和配发结果。`,
    strategy:vc==='buy'
      ?'官方基础条件相对完整，可在核对估值、业务风险和资金占用后考虑小仓申购；认购数据公布后需重新判断。'
      :vc==='caution'
        ?'先核对业务、估值与资金成本；认购倍数和配发结果未出现前，不做重仓判断。'
        :'当前公开事实不足以支持申购，先等待更多披露。'
  };
}
function estimateRangeText(range,suffix=''){
  return range?`${range.low}-${range.high}${suffix}`:'待测算';

function signedEstimateRangeText(range){
  if(!range)return '待测算';

function toLiveIPO(item,temperature){
  const hasCoreFacts=Boolean(item.offerPrice&&item.boardLot&&item.offerDeadline);
  const cornerstoneNames=(item.cornerstoneInvestors||[]).slice(0,5);
  const cornerstoneSuffix=(item.cornerstoneInvestors||[]).length>5?'等':'';
  const assessment=assessLiveIPO(item,temperature);
  const estimate=item.modelEstimate||null;
  const cornerstoneFacts=cornerstoneNames.length
    ?`${cornerstoneNames.join('、')}${cornerstoneSuffix}${Number.isFinite(item.cornerstonePercent)?`，约占发售股份 ${item.cornerstonePercent}%`:item.cornerstoneAmount?`，认购约 ${item.cornerstoneAmount}`:''}`
    :Number.isFinite(item.cornerstonePercent)&&item.cornerstonePercent>0
      ?`基石约占发售股份 ${item.cornerstonePercent}%`
      :'见招股章程';
  const offerPriceText=item.offerPrice||(
    Number.isFinite(item.offerPriceValue)
      ?`${Number(item.offerPriceValue).toFixed(2)} 港元`
      :'以招股章程为准'
  );
  const boardLotShares=Number.isFinite(item.boardLotShares)
    ?Number(item.boardLotShares)
    :Number(String(item.boardLot||'').replace(/,/g,''))||null;
  const entryFee=Number.isFinite(item.entryFee)
    ?item.entryFee
    :Number.isFinite(item.offerPriceValue)&&boardLotShares
      ?item.offerPriceValue*boardLotShares*1.010085
      :null;
  return {
    ...item,
    ind:item.industry||'港交所主板新股',
    deadline:item.offerDeadline?`${item.offerDeadline} 截止`:'截止日期待确认',
    listDate:item.listingDate||'待公布',
    score:assessment.score,
    verdict:assessment.verdict,
    vc:assessment.vc,
    one:assessment.vc==='ended'
      ?assessment.reason
      :hasCoreFacts?assessment.reason:'港交所已发布招股文件；部分核心字段仍待自动解析。',
    priceRange:offerPriceText,
    lot:boardLotShares?`${boardLotShares.toLocaleString('zh-CN')}股/手`:'以招股章程为准',
    entry:Number.isFinite(entryFee)?`${entryFee.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})} 港元`:'待解析',
    period:item.offerStart&&item.offerDeadline?`${item.offerStart} 至 ${item.offerDeadline}`:'以招股章程为准',
    sponsor:item.sponsor||'见招股章程',
    sponsorNames:item.sponsorNames||[],
    underwriterNames:item.underwriterNames||[],
    stabilizingManager:item.stabilizingManager||'见新上市公告',
    corner:cornerstoneFacts,
    oversub:Number.isFinite(item.publicOversubscription)
      ?`${item.publicOversubscription.toFixed(1)}x`
      :estimateRangeText(estimate?.subscriptionMultiple,'x'),
    win:estimateRangeText(estimate?.oneLotWinRate,'%'),
    dark:estimate?.greyMarketChange?[estimate.greyMarketChange.low,estimate.greyMarketChange.high,estimate.greyMarketChange.mid]:[0,0,0],
    day:estimate?.firstDayChange?[estimate.firstDayChange.low,estimate.firstDayChange.high,estimate.firstDayChange.mid]:[0,0,0],
    estimate,
    strategyAssessment:item.strategyAssessment||null,
    historicalReview:item.historicalReview||null,
    isAH:Boolean(item.isAH),
    publicOversubscription:item.publicOversubscription,
    approxSubscriptionAmount:item.approxSubscriptionAmount,
    bd:[],
    strategy:assessment.strategy,
    pros:[`公司、代码、招股价和时间表均来自港交所官方文件${cornerstoneNames.length?'，保荐人与基石名单来自招股章程':''}`],
    cons:['认购倍数、业务估值与最终配发结果尚未公布或尚未解析','预测区间来自历史相似样本，不是实时认购或收益承诺']
  };
}
function applyLiveData(payload){
  LIVE.status=payload.status||'partial';
  LIVE.updatedAt=payload.updatedAt||null;
  LIVE.sources=payload.sources||[];
  LIVE.strategyHealth=payload.strategyHealth||null;
  LIVE.error=null;
  LIVE.hasUS=Boolean(payload.us?.stocks?.length||US_STOCKS.length);
  LIVE.hasHK=Boolean(payload.hk?.listings?.length||HK_LIVE_IPOS.length);
  LIVE.hasAShare=Boolean(payload.aShare?.quotes?.length||payload.aShare?.fundamentals?.length||A_SHARES.length);
  LIVE.hasInvestors=Boolean(payload.investors?.length||INVESTORS.length);

  if(payload.us?.stocks?.length){
    const bySymbol=new Map(payload.us.stocks.map(row=>[row.symbol,row]));
    US_STOCKS.forEach(stock=>{
      const live=bySymbol.get(stock.t);
      if(!live)return;
      stock.price=live.price;
      stock.chg=live.changePercent;
      stock.weeklyChange=live.weeklyChange;
      stock.volumeRatio=live.volumeRatio;
      stock.heatScore=live.heatScore;
      stock.history=live.history;
      stock.asOf=live.asOf;
      stock.marketState=live.marketState;
      stock.source='Yahoo Finance';
      if(live.technicalPlan){
        stock.buy=live.technicalPlan.buy;
        stock.stop=live.technicalPlan.stop;
        stock.tp=live.technicalPlan.tp;
        stock.atr=live.technicalPlan.atr;
        stock.pricePlan=live.technicalPlan;
      }
      syncUSAliases(stock);
    });
    const latest=payload.us.stocks.map(x=>x.asOf).filter(Boolean).sort().at(-1);
    LIVE.usMarketNote=`行情截至 ${fmtDate(latest)}`;
  }
  if(payload.us?.fundamentals?.length){
    const bySymbol=new Map(payload.us.fundamentals.map(row=>[row.symbol,row]));
    US_STOCKS.forEach(stock=>{
      const data=bySymbol.get(stock.t);
      if(!data)return;
      stock.score=data.finalScore;
      stock.valueScore=data.valueScore;
      stock.growthScore=data.growthScore;
      stock.profitScore=data.profitScore;
      stock.finalGrade=data.finalScore>=85?'A':data.finalScore>=70?'B':data.finalScore>=55?'C':'D';
      stock.verdict=data.finalScore>=85?'低估':data.finalScore>=70?'合理偏低':data.finalScore>=55?'合理':'高估';
      stock.vc=data.finalScore>=85?'cheap':data.finalScore>=55?'fair':'rich';
      stock.bd=[
        ['估值',data.valueScore],
        ['成长',data.growthScore],
        ['盈利质量',data.profitScore],
        ['动量',stock.heatScore||50],
        ['市场情绪',Math.min(100,stock.heatScore||50)]
      ];
      stock.fundamentals=data;
      stock.qualityCriteria=data.qualityCriteria||{};
      stock.qualityMatchCount=data.qualityMatchCount||0;
      stock.qualityEligible=Boolean(data.qualityEligible);
      syncUSAliases(stock);
    });
  }
  if(payload.us?.temperature){
    US_TEMP.v=payload.us.temperature.value;
    US_TEMP.label=payload.us.temperature.label;
    US_TEMP.hint=payload.us.temperature.hint;
  }

  HK_LIVE_IPOS=payload.hk?.listings?.length
    ?payload.hk.listings.map(item=>toLiveIPO(item,payload.hk.temperature))
    :[];
  if(payload.hk?.temperature){
    HK_TEMP.v=payload.hk.temperature.value;
    HK_TEMP.label=payload.hk.temperature.label;
    HK_TEMP.hint=payload.hk.temperature.hint;
  }
  LIVE.hkBacktest=payload.hk?.backtest||null;

  const liveManagers=payload.investors||[];
  if(liveManagers.length){
    LIVE.liveInvestorIds=new Set(liveManagers.map(manager=>manager.id));
    US_STOCKS.forEach(stock=>{stock.holders=[]});
    liveManagers.forEach(manager=>{
      const target=INVESTORS.find(item=>item.id===manager.id);
      if(!target)return;
      const interpretations=new Map(target.holds.map(holding=>[holding[0],holding[4]]));
      target.aum=`披露持仓 ${fmtMoney(manager.portfolioValue)}`;
      target.q=`${manager.reportDate} 13F · ${manager.filingDate}披露`;
      target.sourceUrl=manager.sourceUrl;
      target.stance='最新披露已更新';
      target.sc='caution';
      const instrumentName=holding=>holding.putCall
        ?`${holding.ticker} ${holding.putCall==='Put'?'看跌期权':'看涨期权'}`
        :holding.ticker;
      const positionChange=holding=>holding.putCall
        ?`${holding.changeLabel} · ${holding.putCall==='Put'?'看跌期权':'看涨期权'}`
        :holding.changeLabel;
      target.one=`SEC 13F 显示前五大申报敞口为 ${manager.holdings.slice(0,5).map(instrumentName).join('、')}。13F 有时间滞后，不能代表当前仓位。`;
      target.holds=manager.holdings.slice(0,5).map(holding=>[
        instrumentName(holding),
        holding.issuer,
        `${holding.weight.toFixed(1)}%`,
        positionChange(holding),
        interpretations.get(holding.ticker)||'暂无可验证的公开买卖理由，先只把它视为组合变化。'
      ]);
      const changed=manager.holdings.filter(h=>h.changeType!=='same').slice(0,5).map(h=>[
        manager.filingDate,
        h.changeType==='down'?'sell':'buy',
        `${h.changeLabel} ${instrumentName(h)}`,
        `对比 ${manager.previousReportDate||'上一期'} 与 ${manager.reportDate} 的 13F 持股数量`
      ]);
      const sold=(manager.sold||[]).slice(0,2).map(h=>[
        manager.filingDate,
        'sell',
        `退出披露 ${h.ticker}`,
        `本期 13F 未再出现；不等同于实时清仓日期`
      ]);
      target.moves=[...changed,...sold];
      target.isLive=true;
      manager.holdings.forEach(holding=>{
        const stock=US_STOCKS.find(item=>item.t===holding.ticker);
        if(stock){
          stock.holders.push([target.name,positionChange(holding),target.id]);
        }
      });
    });
  }else{
    LIVE.liveInvestorIds=new Set(INVESTORS.map(item=>item.id));
  }
}
async function loadLiveData(){
  const publicBase=location.hostname.endsWith('.github.io')?'/aurumer/':'/';
  const isStaticHost=location.hostname.endsWith('.github.io')||location.hostname==='localhost'||location.hostname==='127.0.0.1';
  const sources=isStaticHost
    ?[`${publicBase}data/live-snapshot.json`]
    :['/api/live',`${publicBase}data/live-snapshot.json`];
  let lastError;
  for(const source of sources){
    try{
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(),5000);
      const response=await fetch(source,{cache:'no-store',signal:controller.signal});
      clearTimeout(timeout);
      if(!response.ok)throw new Error(`数据服务 ${response.status}`);
      applyLiveData(await response.json());
      if(!HK_LIVE_IPOS.length||DEMO_MODE){
        const demoHKListings=await loadDemoHKListings();
        if(demoHKListings.length){
          const existing=new Set((HK_LIVE_IPOS||[]).map((item)=>String(item.code||item.stockCode||item.id||"").toLowerCase()));
          HK_LIVE_IPOS=[
            ...HK_LIVE_IPOS,
            ...demoHKListings.filter((item)=>{
              const key=String(item.code||item.stockCode||item.id||"").toLowerCase();
              return key&&!existing.has(key);
            })
          ];
          LIVE.hasHK=Boolean(HK_LIVE_IPOS.length);
        }
      }
      router();
      return;
    }catch(error){
      lastError=error;
    }
  }
  LIVE.status='partial';
  const demoHKListings=await loadDemoHKListings();
  if(demoHKListings.length){
    HK_LIVE_IPOS=demoHKListings;
  }
  LIVE.hasHK=Boolean(HK_LIVE_IPOS.length);
  LIVE.hasUS=Boolean(US_STOCKS.length);
  LIVE.hasAShare=Boolean(A_SHARES.length);
  LIVE.hasInvestors=Boolean(INVESTORS.length);
  LIVE.error=lastError?.message||'实时数据暂不可用';
  router();
}

async function loadDemoHKListings(){
  try{
    const publicBase=location.hostname.endsWith('.github.io')?'/aurumer/':'/';
    const response=await fetch(`${publicBase}data/demo/hk-ipos.json`,{cache:'no-store'});
    if(!response.ok)return [];
    const parsed=await response.json();
    return Array.isArray(parsed)
      ?parsed.map(item=>toLiveIPO({
          ...item,
          code:item.code||(item.stockCode?`${String(item.stockCode).replace(/\s+/g,'')}.HK`:''),
        },HK_TEMP))
      :[];
  }catch{
    return [];
  }
}

function routeFromPath(pathname){
  const normalizedPath=pathname.replace(/^\/aurumer(?=\/|$)/,'');
  const parts=normalizedPath.split('/').filter(Boolean).map(decodeURIComponent);
  if(parts[0]==='hk-ipo')return parts[1]?`ipo/${parts[1]}`:'hk';
  if(parts[0]==='us-stocks')return 'us';
  if(parts[0]==='a-shares')return parts[1]?`a-share/${parts[1].toUpperCase()}`:'a-shares';
  if(parts[0]==='stocks'&&parts[1])return `stock/${parts[1].toUpperCase()}`;
  if(parts[0]==='gurus')return parts[1]?`investor/${parts[1].toLowerCase()}`:'gurus';
  if(parts[0]==='history')return 'history';
  return '';
}
function findIPO(id){
  const normalized=(id||'').toLowerCase().replace(/^hk-/,'').replace(/\.hk$/,'');
  return getHKListings().find(item=>{
    const itemId=(item.id||'').toLowerCase();
    const itemCode=(item.code||'').toLowerCase().replace(/\.hk$/,'');
    const numericCode=itemCode.replace(/^0+/,'');
    const numericInput=normalized.replace(/^0+/,'');
    return itemId===id?.toLowerCase()||
      itemId.replace(/^hk-/,'')===normalized||
      itemCode===normalized||
      (numericInput&&numericCode===numericInput);
  });
}
function findAShare(id){
  const normalized=(id||'').toLowerCase().replace(/\.sh$|\.sz$/,'');
  return A_SHARES.find(item=>{
    const itemCode=(item.code||'').toLowerCase();
    const numericCode=itemCode.replace(/\.sh$|\.sz$/,'');
    return item.id.toLowerCase()===id?.toLowerCase()||
      itemCode===id?.toLowerCase()||
      numericCode===normalized;
  });
}

    if(page==='stock'){const x=US_STOCKS.find(i=>i.t===id);return x?renderStock(x):renderNotFound('未找到这只美股','#/us')}
    if(page==='investor'){

    </div>

  </article>`;

function matchIPOHistoryContext(x){
  const history=LIVE.hkBacktest;
  if(!history)return {sponsor:null,industry:null};
  const summarizeRows=(rows)=>{
    const values=(rows||[])
      .map(row=>Number(row.firstDayChange))
      .filter(Number.isFinite);
    if(!values.length)return null;
    const average=values.reduce((sum,value)=>sum+value,0)/values.length;
    const winRate=values.filter(value=>value>0).length/values.length*100;
    return {
      averageFirstDay:average,
      sampleCount:values.length,
      winRate,
    };
  };
  const aliases=[
    ['中国国际金融','中金公司'],['中信','中信证券'],['国泰君安','国泰君安'],
    ['海通','海通国际'],['华泰','华泰'],['汇丰','汇丰'],['摩根大通','摩根大通'],
    ['高盛','高盛'],['德意志','德意志银行'],['建银国际','建银国际']
  ];
  const sponsorAliases=aliases.filter(([legal])=>(x.sponsor||'').includes(legal)).map(([,short])=>short);
  const sponsorStats=Array.isArray(history.sponsorStats)?history.sponsorStats:[];
  const sponsor=sponsorStats.find(stat=>sponsorAliases.some(alias=>stat.name.includes(alias)||alias.includes(stat.name)))||null;
  const industryName=String(x.ind||x.industry||'').split('/')[0].trim();
  const industryStats=Array.isArray(history.industryStats)?history.industryStats:[];
  let industry=industryStats.find(stat=>stat.name===industryName||stat.name.includes(industryName)||industryName.includes(stat.name))||null;
  if(!industry&&Array.isArray(history.recent)){
    const rows=history.recent.filter(row=>{
      const rowIndustry=String(row.industry||'').split('/')[0].trim();
      return rowIndustry===industryName||rowIndustry.includes(industryName)||industryName.includes(rowIndustry);
    });
    const summary=summarizeRows(rows);
    if(summary)industry={name:industryName||'同行业',...summary};
  }
  return {sponsor,industry};
}
function ipoHistoryContext(x){
  const {sponsor,industry}=matchIPOHistoryContext(x);
  if(!sponsor&&!industry)return '';
  const items=[];
  if(industry){
    items.push(`同行业样本 ${industry.sampleCount} 只，首日上涨率 ${industry.winRate.toFixed(0)}%，平均首日 ${pct(industry.averageFirstDay)}`);

  }
  return `<div class="d-sec"><h4>历史回看</h4><div class="card">
    <div class="advice"><b>望潮提示：</b>${items.join('；')}。</div>

}

function stockAction(x){
  const verified=Boolean(LIVE.strategyHealth?.us?.pricePlanReleaseReady);
  const position=stockPositionFacts(x);
  if(!verified){
    if((x.weeklyChange||0)>8)return '不追高';
    if(Number.isFinite(position.drawdownFromHigh)&&position.drawdownFromHigh>=-3)return '不追高';
    if(Number.isFinite(position.rangePosition)&&position.rangePosition<=25)return '可继续观察';
    if(Number.isFinite(position.drawdownFromHigh))return `还需回落 ${Math.abs(position.drawdownFromHigh).toFixed(0)}%`;
    return '先观察';
  }
  if(!Number.isFinite(x.price)||!Number.isFinite(x.buy)||x.buy<=0)return '价格答案暂未形成可靠参考';
  const distance=(x.price-x.buy)/x.buy*100;
  const upper=Number(x.tp?.[0]);
  if(Number.isFinite(upper)&&x.price>=upper)return '不追高';
  if((x.weeklyChange||0)>8)return '不追高';
  if(distance<=0)return '可小仓观察';
  if(distance<=3)return '可小仓观察';
  return '等回调';
}
function stockPositionFacts(x){
  const history=(x.history||[]).filter(Number.isFinite);
  const price=Number(x.price);
  if(!history.length||!Number.isFinite(price))return {high:null,low:null,drawdownFromHigh:null,rangePosition:null};
  const high=Math.max(price,...history);
  const low=Math.min(price,...history);
  return {
    high,
    low,
    drawdownFromHigh:high>0?(price-high)/high*100:null,
    rangePosition:high>low?(price-low)/(high-low)*100:50,
  };
}
function stockPublicTag(x){
  return MAGNIFICENT_SEVEN.includes(x.t)?'七姐妹':'热度前三';

function stockHeatReason(x){
  const reasons=[];
  if(Number.isFinite(x.volumeRatio))reasons.push(`成交量为近 20 日均量 ${x.volumeRatio.toFixed(1)} 倍`);
  if(Math.abs(x.chg)>=3)reasons.push(`单日波动 ${pct(Number(x.chg.toFixed(1)))}`);
  if(Number.isFinite(x.weeklyChange))reasons.push(`近 5 日 ${pct(Number(x.weeklyChange.toFixed(1)))}`);
  return reasons.slice(0,2).join('，')||x.one;
}

function calcAShareDividend(item, amount, years){
  const price=Number.isFinite(item.currentPrice)?item.currentPrice:Number.isFinite(item.price)?item.price:0;
  const baseYield=Number.isFinite(item.sustainableDividendYield)?item.sustainableDividendYield:Number.isFinite(item.currentDividendYield)?item.currentDividendYield:Number.isFinite(item.dividend_yield)?item.dividend_yield:null;
  const safeAmount=Math.max(0, Number(amount) || 0);
  const safeYears=Math.max(1, Number(years) || 1);
  const shares=price>0?safeAmount / price:0;
  const dividendPerShare=price>0&&Number.isFinite(baseYield)?price * baseYield / 100:0;
  const annualDividend=shares * dividendPerShare;
  const totalDividend=annualDividend * safeYears;
  const paybackYears=annualDividend > 0 ? safeAmount / annualDividend : null;
  return {
    baseYield:Number.isFinite(baseYield)?baseYield:null,
    price,
    shares,
    dividendPerShare,
    annualDividend,
    totalDividend,
    paybackYears,
    safeAmount,
    safeYears,
  };
}
function aShareCalcMarkup(item, amount, years){
  const result=calcAShareDividend(item, amount, years);
  if(!Number.isFinite(result.price)||!Number.isFinite(result.baseYield)||result.baseYield<=0){
    return '<div class="empty-answer">暂无可靠分红数据，先看具体资料。</div>';
  }
  return `<div class="stats g3">
      <div class="stat"><b class="num">${fmtCNY(result.totalDividend)}</b><span>${result.safeYears} 年累计分红</span></div>
      <div class="stat"><b class="num">${result.baseYield.toFixed(1)}%</b><span>年化收益率</span></div>
      <div class="stat"><b class="num">${result.paybackYears ? `${result.paybackYears.toFixed(1)} 年` : '暂不适用'}</b><span>回本年限</span></div>
    </div>`;
}

function formatExitPriceRange(change, x){
  const base=Number.isFinite(x.offerPriceValue)?x.offerPriceValue:Number.isFinite(x.priceHigh)?x.priceHigh:null;
  if(!base||!change)return null;
  const low=(base*(1+change.low/100)).toFixed(2);
  const high=(base*(1+change.high/100)).toFixed(2);
  return `${low}～${high} 港元`;
}
function formatHistoricalPrice(change,x){
  const base=Number.isFinite(x.offerPriceValue)?x.offerPriceValue:Number.isFinite(x.priceHigh)?x.priceHigh:null;
  if(!base||!Number.isFinite(change))return null;
  return `${(base*(1+change/100)).toFixed(2)} 港元（${pct(change)}）`;
}
function ipoExitAnswers(x){
  const validation=LIVE.hkBacktest?.modelValidation;
  const isEnded=x.vc==='ended';
  const review=x.historicalReview||null;
  const publishable=Boolean(x.answerReady||validation?.releaseReady);
  const darkReady=Boolean(publishable&&x.estimate?.publishable&&x.estimate?.greyMarketChange);
  const weekReady=Boolean(publishable&&x.estimate?.publishable&&x.estimate?.fiveDayHighChange);
  return {
    dark:isEnded?(formatHistoricalPrice(review?.greyMarketChange,x)||'历史暗盘价格暂未收录'):darkReady?(formatExitPriceRange(x.estimate.greyMarketChange,x)||'暂不发布可靠卖出价'):'暂不发布可靠卖出价',
    week:isEnded?(formatHistoricalPrice(review?.fiveDayHighChange,x)||'上市后五日内最高价暂未收录'):weekReady?(formatExitPriceRange(x.estimate.fiveDayHighChange,x)||'暂不发布可靠卖出价'):'暂不发布可靠卖出价',
  };
}

function clampScore(value){
  return Math.max(0,Math.min(100,Math.round(Number(value)||0)));
}
function hkIpoScoreProfile(x){
  const industryKey=(x.industry||x.ind||'').split('/')[0].trim();
  const verdict=x.vc||'skip';
  const base=Number.isFinite(x.score)
    ?x.score
    :verdict==='buy'
      ?88
      :verdict==='caution'
        ?72
        :verdict==='ended'
          ?60
          :45;
  const structuralPenalty=(x.isAH?-12:0)+(x.hasHuatai?-10:0)+(x.hasLivermore?6:0);
  const priceSignal=Number.isFinite(x.offerPriceValue)&&Number.isFinite(x.entryFee)
    ?(x.offerPriceValue>=15&&x.entryFee<=12000
      ?10
      :x.offerPriceValue>=10&&x.entryFee<=10000
        ?8
        :x.offerPriceValue>=8&&x.entryFee<=15000
          ?5
          :-2)
    :0;
  const industryBonus={
    AI:14,
    机器人:12,
    工业机器人:12,
    医药:6,
    新能源:8,
    半导体:16,
    SaaS:5,
    生物科技:10,
    低空经济:13,
    跨境电商:11,
    消费:-1,
    物业:-4,
    物流:2,
  }[industryKey] || 0;
  const sponsorSignals=[x.sponsor, ...(x.sponsorNames||[])].join(' ');
  const cornerstoneCount=Array.isArray(x.cornerstoneInvestors)?x.cornerstoneInvestors.length:0;
  const cornerstoneVisible=Boolean(x.corner && !/见招股章程|待/.test(String(x.corner)));
  const oversub=Number.isFinite(x.publicOversubscription)
    ?x.publicOversubscription
    :Number.parseFloat(String(x.oversub||'').replace(/[^\d.]/g,''))||0;
  const darkRef=Number.isFinite(x.historicalReview?.greyMarketChange)
    ?x.historicalReview.greyMarketChange
    :Array.isArray(x.dark)
      ?x.dark[2]
      :NaN;
  const breakdown=[
    ['行业热度',clampScore(base+industryBonus)],
    ['估值合理性',clampScore(base+(verdict==='buy'?6:verdict==='caution'?0:verdict==='ended'?2:-10)+priceSignal+(x.isAH?-6:0))],
    ['基石质量',clampScore(34+cornerstoneCount*14+(cornerstoneVisible?14:0))],
    ['保荐人胜率',clampScore(42+(x.sponsorNames?.length||0)*6+(/中金|高盛|摩根|汇丰|花旗|中信|建银|里昂|摩根士丹利/.test(sponsorSignals)?16:0)+(x.hasLivermore?10:0)+(x.hasHuatai?-12:0))],
    ['公开认购倍数',clampScore(oversub>=1000?96:oversub>=500?88:oversub>=200?78:oversub>=100?68:oversub>=50?58:oversub>=20?46:36)],
    ['国际配售质量',clampScore(40+(x.underwriterNames?.length||0)*8+(/摩根|高盛|中金|汇丰|花旗/.test([...(x.underwriterNames||[]), x.sponsor||''].join(' '))?12:0)+(x.hasHuatai?-8:0))],
    ['暗盘强度',Number.isFinite(darkRef)?clampScore(darkRef>=25?96:darkRef>=15?88:darkRef>=8?78:darkRef>=3?68:darkRef>=0?58:40):clampScore(verdict==='buy'?72:verdict==='caution'?62:50)],
    ['市场环境',clampScore(HK_TEMP.v+(verdict==='buy'?4:verdict==='caution'?0:-8)+structuralPenalty/2)],
  ];
  const computedOverall=clampScore(
    (breakdown[0][1]*15+
    breakdown[1][1]*15+
    breakdown[2][1]*15+
    breakdown[3][1]*10+
    breakdown[4][1]*15+
    breakdown[5][1]*10+
    breakdown[6][1]*15+
    breakdown[7][1]*5)/100
  );
  const overall=Number.isFinite(x.score)?clampScore(x.score):computedOverall;
  return {overall, breakdown};
}

function stockPriceAnswers(x){
  if(!LIVE.strategyHealth?.us?.pricePlanReleaseReady){
    return {buy:'暂不发布可靠价格',sell:'暂不发布可靠价格'};
  }
  const plan=x.pricePlan||x.technicalPlan||null;
  if(!plan?.buy||!plan?.tp?.length){
    return {buy:'暂不发布可靠价格',sell:'暂不发布可靠价格'};
  }
  return {
    buy:`$${Number(plan.buy).toFixed(2)}`,
    sell:`$${Number(plan.tp[0]).toFixed(2)}～$${Number(plan.tp.at(-1)).toFixed(2)}`,
  };
}
